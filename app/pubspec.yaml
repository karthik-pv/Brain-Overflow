name: brain_overflow
description: A production-grade idea validation app with real-time collaboration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.0
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.6.0
  flutter_hooks: ^0.20.5
  go_router: ^14.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0
  flutter_markdown: ^0.7.3
  gap: ^3.0.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.0
  custom_lint: ^0.6.0

flutter:
  uses-material-design: true
